<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易マイクラ - 物理と振動実装版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #87CEEB; }
        #ui {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white;
            background: rgba(0,0,0,0.7); padding: 30px;
            cursor: pointer; border-radius: 10px; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none; display: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>クリックしてプレイ開始</h2>
        <p>W,A,S,D：移動 / SPACE：ジャンプ<br>マウス：視点移動<br>左クリック：ブロック設置 / 右クリック：破壊</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // 【新規】カメラを直接動かさず、この「プレイヤーオブジェクト」を動かす
        const player = new THREE.Object3D();
        player.position.set(0, 10, 0); // 少し高い位置からスタート
        player.add(camera); // カメラをプレイヤーに追加
        scene.add(player);
        camera.position.y = 1.6; // 目の高さ（プレイヤーの足元からの相対位置）

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- テクスチャ生成（前回と同じ） ---
        function createDataTexture(pixels, width, height) {
            const data = new Uint8Array(pixels);
            const texture = new THREE.DataTexture(data, width, height, THREE.RGBAFormat);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            texture.generateMipmaps = false;
            texture.needsUpdate = true;
            return texture;
        }

        const grassTopPixels = [];
        for (let i = 0; i < 16 * 16; i++) {
            const c = 90 + Math.random() * 50;
            grassTopPixels.push(c * 0.6, c, c * 0.4, 255);
        }
        const grassTopTexture = createDataTexture(grassTopPixels, 16, 16);

        const dirtPixels = [];
        for (let i = 0; i < 16 * 16; i++) {
            const c = 100 + Math.random() * 40;
            dirtPixels.push(c, c * 0.7, c * 0.4, 255);
        }
        const dirtTexture = createDataTexture(dirtPixels, 16, 16);

        const grassSidePixels = [];
        for (let y = 0; y < 16; y++) {
            for (let x = 0; x < 16; x++) {
                if (y < 4 + Math.random() * 2) {
                    const c = 90 + Math.random() * 50;
                    grassSidePixels.push(c * 0.6, c, c * 0.4, 255);
                } else {
                    const c = 100 + Math.random() * 40;
                    grassSidePixels.push(c, c * 0.7, c * 0.4, 255);
                }
            }
        }
        const grassSideTexture = createDataTexture(grassSidePixels, 16, 16);

        // --- 光と地面 ---
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x808080));

        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundTexture = grassTopTexture.clone();
        groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ map: groundTexture });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- コントロール ---
        // 【修正】cameraではなくplayerをコントロール対象にする
        const controls = new PointerLockControls(player, document.body);
        const ui = document.getElementById('ui');
        const crosshair = document.getElementById('crosshair');

        ui.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => { ui.style.display = 'none'; crosshair.style.display = 'block'; });
        controls.addEventListener('unlock', () => { ui.style.display = 'block'; crosshair.style.display = 'none'; });

        // --- ブロックマテリアルと設置処理 ---
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const grassBlockMaterials = [
            new THREE.MeshLambertMaterial({ map: grassSideTexture }),
            new THREE.MeshLambertMaterial({ map: grassSideTexture }),
            new THREE.MeshLambertMaterial({ map: grassTopTexture }),
            new THREE.MeshLambertMaterial({ map: dirtTexture }),
            new THREE.MeshLambertMaterial({ map: grassSideTexture }),
            new THREE.MeshLambertMaterial({ map: grassSideTexture })
        ];

        // 衝突判定用に「地面」と「設置したブロック」を区別する
        const objects = []; // 衝突判定を行うオブジェクト（設置ブロック）
        const interactableObjects = [ground]; // クリック判定を行うオブジェクト

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0);

        document.addEventListener('mousedown', (event) => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(mouse, camera);
            // クリック判定は地面も含める
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (event.button === 0) { // 左クリック：設置
                    const voxel = new THREE.Mesh(blockGeo, grassBlockMaterials);
                    voxel.position.copy(intersect.point).add(intersect.face.normal);
                    voxel.position.divideScalar(1).floor().multiplyScalar(1).addScalar(0.5);
                    scene.add(voxel);
                    objects.push(voxel); // 衝突判定リストに追加
                    interactableObjects.push(voxel); // クリック判定リストに追加
                } else if (event.button === 2) { // 右クリック：破壊
                    if (intersect.object !== ground) {
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                        interactableObjects.splice(interactableObjects.indexOf(intersect.object), 1);
                    }
                }
            }
        });

        // --- 【新規】物理法則と移動の変数 ---
        const velocity = new THREE.Vector3(); // プレイヤーの速度
        const direction = new THREE.Vector3(); // 移動方向
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false; // ジャンプ可能か（接地しているか）
        let isMoving = false; // 動いているか（振動用）

        // プレイヤーの当たり判定サイズ
        const playerRadius = 0.4;
        const playerHeight = 1.8;

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 15; canJump = false; break; // ジャンプ
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // --- 【新規】衝突判定関数 ---
        // プレイヤーが指定した位置(pos)に移動できるかチェックする
        function checkCollision(pos, sceneObjects) {
            // 地面との判定（Y=0）
            if (pos.y < 0) return true;

            // 設置されたブロックとの判定
            const playerBB = new THREE.Box3().setFromCenterAndSize(
                new THREE.Vector3(pos.x, pos.y + playerHeight/2, pos.z),
                new THREE.Vector3(playerRadius * 2, playerHeight, playerRadius * 2)
            );

            for (let i = 0; i < sceneObjects.length; i++) {
                const objectBB = new THREE.Box3().setFromObject(sceneObjects[i]);
                if (playerBB.intersectsBox(objectBB)) {
                    return true; // 衝突した
                }
            }
            return false; // 衝突なし
        }

        // --- アニメーションループ ---
        let prevTime = performance.now();
        let bobbingTimer = 0; // 【新規】振動用タイマー

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            
            if (controls.isLocked) {
                const delta = (time - prevTime) / 1000; // 秒単位の経過時間

                // 1. 重力と摩擦の計算
                velocity.x -= velocity.x * 10.0 * delta; // 横方向の摩擦
                velocity.z -= velocity.z * 10.0 * delta; // 横方向の摩擦
                velocity.y -= 30.0 * delta; // 重力 (1秒間に-30)

                // 2. 移動方向の決定
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // 3. 速度の計算（歩く）
                isMoving = false;
                const moveSpeed = 40.0;
                if (moveForward || moveBackward) { velocity.z -= direction.z * moveSpeed * delta; isMoving = true; }
                if (moveLeft || moveRight) { velocity.x -= direction.x * moveSpeed * delta; isMoving = true; }

                // 4. 【重要】衝突判定を含めた移動処理
                const nextPos = player.position.clone();
                
                // --- X方向の移動と衝突 ---
                nextPos.x += (velocity.x * delta);
                if (checkCollision(new THREE.Vector3(nextPos.x, player.position.y, player.position.z), objects)) {
                    velocity.x = 0; // 衝突したら速度をゼロに
                } else {
                    player.position.x = nextPos.x; // 衝突しなければ移動
                }

                // --- Z方向の移動と衝突 ---
                nextPos.z += (velocity.z * delta);
                if (checkCollision(new THREE.Vector3(player.position.x, player.position.y, nextPos.z), objects)) {
                    velocity.z = 0;
                } else {
                    player.position.z = nextPos.z;
                }

                // --- Y方向（重力・ジャンプ）の移動と衝突 ---
                player.position.y += (velocity.y * delta);
                
                // 接地判定（足元）
                if (player.position.y < 0) { // 地面
                    velocity.y = 0;
                    player.position.y = 0;
                    canJump = true;
                } else {
                    // ブロックの上または下
                    const playerFeet = player.position.clone();
                    const playerHead = player.position.clone(); playerHead.y += playerHeight;

                    // 足元の衝突（着地）
                    if (checkCollision(playerFeet, objects)) {
                        if (velocity.y < 0) { // 落下中なら着地
                            velocity.y = 0;
                            // グリッドにスナップさせる処理（簡易版：最も近いブロックの上に置く）
                            player.position.y = Math.ceil(player.position.y); 
                            canJump = true;
                        }
                    } else {
                        canJump = false; // 空中
                    }

                    // 頭の衝突（天井にぶつかる）
                    if (checkCollision(playerHead, objects) && velocity.y > 0) {
                        velocity.y = 0; // 上昇を止める
                    }
                }

                // 5. 【新規】歩くときの振動（ボビング）
                if (isMoving && canJump) {
                    bobbingTimer += delta * 15; // 振動の速さ
                    // サイン波を使ってカメラを上下左右に揺らす
                    camera.position.y = 1.6 + Math.sin(bobbingTimer) * 0.05; // 上下
                    camera.position.x = Math.sin(bobbingTimer * 0.5) * 0.02; // 左右
                } else {
                    // 止まっているときはカメラをゆっくり元に戻す
                    camera.position.y += (1.6 - camera.position.y) * 0.2;
                    camera.position.x += (0 - camera.position.x) * 0.2;
                    if (!canJump) bobbingTimer = 0; // 空中ではタイマーリセット
                }
            }

            renderer.render(scene, camera);
            prevTime = time;
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
